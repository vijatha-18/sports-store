<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SportsHub</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<section class="hero">

<div class="hero-content">

<h2>Gear Up With SportsHub</h2>

<p>Elite Sports Equipment For Champions</p>

<button class="hero-btn">Shop Now</button>

</div>

</section>
<body>

<header class="header">

<h1>SportsHub</h1>

<div class="controls">

<input id="search" type="text" placeholder="Search sports gear...">

<select id="sort">
<option value="">Sort</option>
<option value="low">Price Low → High</option>
<option value="high">Price High → Low</option>
</select>

<button id="themeToggle">🌙</button>

<button onclick="toggleCart()">🛒 <span id="cart-count">0</span></button>

</div>

</header>

<div class="filters">

<button onclick="filterCategory('all')">All</button>
<button onclick="filterCategory('football')">Football</button>
<button onclick="filterCategory('cricket')">Cricket</button>
<button onclick="filterCategory('basketball')">Basketball</button>
<button onclick="filterCategory('fitness')">Fitness</button>
<button onclick="filterCategory('badminton')">Badminton</button>
<button onclick="filterCategory('running')">Running</button>
<button onclick="filterCategory('accessories')">Accessories</button>

</div>

<section class="products" id="product-list">

<div class="product cricket" data-price="1999">
<img src="https://images.unsplash.com/photo-1593341646782-e0b495cff86d">
<h3>Cricket Bat</h3>
<p>₹1999</p>
<button onclick="addToCart('Cricket Bat',1999)">Add to Cart</button>
</div>

<div class="product football" data-price="899">
<img src="https://images.unsplash.com/photo-1575361204480-aadea25e6e68">
<h3>Football</h3>
<p>₹899</p>
<button onclick="addToCart('Football',899)">Add to Cart</button>
</div>

<div class="product football" data-price="999">
<img src="https://images.unsplash.com/photo-1519861531473-9200262188bf">
<h3>Basketball</h3>
<p>₹999</p>
<button onclick="addToCart('Basketball',999)">Add to Cart</button>
</div>

<div class="product fitness" data-price="1899">
<img src="https://images.unsplash.com/photo-1526676037777-05a232554f77">
<h3>Dumbbells</h3>
<p>₹1899</p>
<button onclick="addToCart('Dumbbells',1899)">Add to Cart</button>
</div>

<div class="product fitness" data-price="499">
<img src="https://images.unsplash.com/photo-1599058917765-a780eda07a3e">
<h3>Skipping Rope</h3>
<p>₹499</p>
<button onclick="addToCart('Skipping Rope',499)">Add to Cart</button>
</div>

</section>

<h2 id="no-products">No products found 😕</h2>

<div id="popup">Added to Cart ✅</div>

<div id="cart-overlay" onclick="toggleCart()"></div>

<div class="cart" id="cart">

<div class="cart-header">
<h2>Your Cart</h2>
<button onclick="toggleCart()">✖</button>
</div>

<div class="cart-items" id="cart-items"></div>

<div class="cart-footer">
<h3>Total: ₹<span id="cart-total">0</span></h3>
<button class="checkout-btn">Checkout</button>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
